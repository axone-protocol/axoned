name: Test / Blockchain

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/test-blockchain.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/test-blockchain.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-blockchain:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install jq
        run: sudo apt-get install jq

      - name: Setup Go environment
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Install AXONE blockchain
        run: |
          make build-go && make install

      - name: Initialize blockchain
        run: |
          make chain-init

      - name: Start the blockchain
        run: |
          make chain-start&

      - name: Wait for blockchain to start
        uses: ifaxity/wait-on-action@a7d13170ec542bdca4ef8ac4b15e9c6aa00a6866 # v1
        with:
          resource: http://0.0.0.0:26657/status
          timeout: 10000 # ms

      - name: Verify blockchain startup
        run: |
          STATUS=$(curl "http://0.0.0.0:26657/status")
          CHECK=$(echo "$STATUS" | jq '.result.validator_info | has("address")')

          if [ "$CHECK" != "true" ]; then
            echo "❌ Blockchain test failed"
            echo "$STATUS"
            exit 1
          fi

      - name: Stop the blockchain
        run: |
          make chain-stop
