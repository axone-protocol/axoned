name: Build / Docker Heighliner

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-docker-heighliner.yml'
      - '.heighliner/**'
      - 'app/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'proto/**'
      - 'scripts/**'
      - 'version'
      - 'x/**'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/build-docker-heighliner.yml'
      - '.heighliner/**'
      - 'app/**'
      - 'cmd/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'proto/**'
      - 'scripts/**'
      - 'version'
      - 'x/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docker-heighliner:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build docker image for Heighliner
        run: |
          make build-docker
