name: Lint / Proto

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lint-proto.yml'
      - 'proto/**/*.proto'
      - 'proto/buf.yaml'
      - 'buf.work.yaml'
      - 'Makefile'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lint-proto.yml'
      - 'proto/**/*.proto'
      - 'proto/buf.yaml'
      - 'buf.work.yaml'
      - 'Makefile'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-proto:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Lint proto files
        run: |
          make lint-proto
