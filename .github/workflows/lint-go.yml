name: Lint / Go

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lint-go.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'flake.nix'
      - 'flake.lock'
      - 'Makefile'
      - '.golangci.yml'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lint-go.yml'
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'flake.nix'
      - 'flake.lock'
      - 'Makefile'
      - '.golangci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-go:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Install Nix
        uses: cachix/install-nix-action@a49548c11d9846ad46ecc0115273879b045f001c # v31.10.7

      - name: Lint go code (golangci-lint)
        run: |
          nix develop --command make lint-go-golangci

      - name: Verify Go modules are tidy
        run: |
          nix develop --command go mod tidy
          if ! git diff --quiet -- go.mod go.sum; then
            echo "❌ go.mod or go.sum are out of date"
            git --no-pager diff -- go.mod go.sum
            exit 1
          fi
          echo "✅ go.mod and go.sum are tidy"

      - name: Lint go code (gofumpt)
        run: |
          nix develop --command make lint-go-gofumpt
