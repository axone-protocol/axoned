name: Lint / Generated

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lint-generated.yml'
      - 'app/**'
      - 'cmd/**'
      - 'docs/command/**'
      - 'docs/predicate/**'
      - 'docs/proto/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'proto/**'
      - 'scripts/**'
      - 'x/**'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lint-generated.yml'
      - 'app/**'
      - 'cmd/**'
      - 'docs/command/**'
      - 'docs/predicate/**'
      - 'docs/proto/**'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'proto/**'
      - 'scripts/**'
      - 'x/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-generated:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go environment
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: 'go.mod'
          cache: true
          cache-dependency-path: |
            go.sum

      - name: Generate command documentation
        run: |
          make doc-command

      - name: Generate proto and documentation
        run: |
          make doc-proto

      - name: Generate predicates documentation
        run: |
          make doc-predicate

      - name: Check Git diff in generated files (proto + docs)
        run: |
          if [[ $(git status -s | grep --fixed-strings -v "go.mod" | grep --fixed-strings -v "go.sum") != "" ]]; then
            >&2 echo "❌ There is a diff between generated files and source code"
            >&2 git status
            exit 1
          fi
