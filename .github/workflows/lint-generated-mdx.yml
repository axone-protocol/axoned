name: Lint / Generated MDX

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/lint-generated-mdx.yml'
      - '.github/scripts/check-generated-mdx.mjs'
      - 'docs/command/**/*.md'
      - 'docs/predicate/**/*.md'
      - 'docs/proto/**/*.md'

  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/lint-generated-mdx.yml'
      - '.github/scripts/check-generated-mdx.mjs'
      - 'docs/command/**/*.md'
      - 'docs/predicate/**/*.md'
      - 'docs/proto/**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-generated-mdx:
    runs-on: ubuntu-22.04
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node environment
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: '20'

      - name: Validate committed generated markdown with MDX parser
        run: |
          TMPDIR=$(mktemp -d)
          cp .github/scripts/check-generated-mdx.mjs "$TMPDIR/check-generated-mdx.mjs"
          npm install --prefix "$TMPDIR" --no-save @mdx-js/mdx@3.1.1
          node "$TMPDIR/check-generated-mdx.mjs"
